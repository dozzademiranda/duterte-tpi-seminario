<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Principal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .menu-item {
            display: flex;
        }

        .menu-item a {
            flex: 1;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .menu-item a:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            border-color: white;
        }

        .menu-item a:active {
            transform: translateY(-1px);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .menu {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .menu-item a {
                padding: 15px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Menu Principal</h1>
        <div class="menu">
            <div class="menu-item"><a href="1.html">1</a></div>
            <div class="menu-item"><a href="2.html">2</a></div>
            <div class="menu-item"><a href="3.html">3</a></div>
            <div class="menu-item"><a href="4.html">4</a></div>
            <div class="menu-item"><a href="5.html">5</a></div>
            <div class="menu-item"><a href="6.html">6</a></div>
            <div class="menu-item"><a href="7.html">7</a></div>
            <div class="menu-item"><a href="8.html">8</a></div>
            <div class="menu-item"><a href="9.html">9</a></div>
            <div class="menu-item"><a href="10.html">10</a></div>
        </div>
    </div>
</body>
</html>
